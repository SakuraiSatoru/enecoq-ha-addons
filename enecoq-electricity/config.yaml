name: enecoQ Electricity Scraper
slug: enecoq_electricity
version: "1.1.0"
description: Scrape enecoQ monthly electricity usage and expose a monotonic total for Home Assistant Energy
arch:
  - amd64
startup: services
boot: auto
init: false
map:
  - share:rw

options:
  username: ""
  password: ""
  interval_hours: 1
  login_url: "https://www.cyberhome.ne.jp/app/sslLogin.do"
  debug: false

schema:
  username: str
  password: password
  interval_hours: int(1,168)
  login_url: str
  debug: bool
